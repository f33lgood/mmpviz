<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300"><rect x="0" y="0" width="800" height="300" fill="#2A363B" /><g /><g><text x="100.0" y="-20" stroke="black" fill="lightgrey" stroke-width="0" font-size="24px" font-weight="normal" font-family="Helvetica" text-anchor="middle" alignment-baseline="middle" transform="translate(200,50)">Address Link Example</text><g transform="translate(200,50)"><rect x="0" y="0" width="200" height="200" fill="#2A363B" stroke="grey" stroke-width="1" /><rect x="0" y="150.0" width="200" height="50.0" fill="#E84A5F" stroke="grey" stroke-width="1" /><text x="100.0" y="175.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="middle" alignment-baseline="middle">TPIU</text><text x="210" y="200.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">0xe8040000</text><rect x="0" y="100.0" width="200" height="50.0" fill="#FF847C" stroke="grey" stroke-width="1" /><text x="100.0" y="125.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="middle" alignment-baseline="middle">ETM</text><text x="210" y="150.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">0xe8041000</text><rect x="0" y="50.0" width="200" height="50.0" fill="#FECEA8" stroke="grey" stroke-width="1" /><text x="100.0" y="75.0" stroke="black" fill="grey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="middle" alignment-baseline="middle">External PPB</text><text x="210" y="100.0" stroke="black" fill="grey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">0xe8042000</text><rect x="0" y="0.0" width="200" height="50.0" fill="#99B898" stroke="grey" stroke-width="1" /><text x="100.0" y="25.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="middle" alignment-baseline="middle">ROM Table</text><text x="210" y="50.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">0xe8043000</text></g></g><g><g transform="translate(200,50)"><g><g transform="translate(200,25.0)"><polyline points="0,-10 -5,-10 0,0 5,-10 0,-10" stroke="lightgrey" stroke-width="1" fill="lightgrey" transform="rotate(90,0,0)" /></g><text x="353" y="25.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">In direction</text><polyline points="200,25.0 350,25.0" stroke="lightgrey" stroke-dasharray="4,2" stroke-width="1" /></g><g><text x="353" y="75.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">No direction</text><polyline points="200,75.0 350,75.0" stroke="lightgrey" stroke-dasharray="4,2" stroke-width="1" /></g><g><g transform="translate(350,125.0)"><polyline points="0,-10 -5,-10 0,0 5,-10 0,-10" stroke="lightgrey" stroke-width="1" fill="lightgrey" transform="rotate(270,0,0)" /></g><text x="353" y="125.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">Out direction</text><polyline points="200,125.0 350,125.0" stroke="lightgrey" stroke-dasharray="4,2" stroke-width="1" /></g><g><g transform="translate(-40,125.0)"><polyline points="0,-10 -5,-10 0,0 5,-10 0,-10" stroke="lightgrey" stroke-width="1" fill="lightgrey" transform="rotate(90,0,0)" /></g><text x="-43" y="125.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="end" alignment-baseline="middle">Label at left side</text><polyline points="0,125.0 -40,125.0" stroke="lightgrey" stroke-dasharray="4,2" stroke-width="1" /></g><g><g transform="translate(200,175.0)"><polyline points="0,-10 -5,-10 0,0 5,-10 0,-10" stroke="lightgrey" stroke-width="1" fill="lightgrey" transform="rotate(90,0,0)" /></g><g transform="translate(350,175.0)"><polyline points="0,-10 -5,-10 0,0 5,-10 0,-10" stroke="lightgrey" stroke-width="1" fill="lightgrey" transform="rotate(270,0,0)" /></g><text x="353" y="175.0" stroke="black" fill="lightgrey" stroke-width="0" font-size="16" font-weight="normal" font-family="Helvetica" text-anchor="start" alignment-baseline="middle">In and Out directions</text><polyline points="200,175.0 350,175.0" stroke="lightgrey" stroke-dasharray="4,2" stroke-width="1" /></g></g></g><g><g transform="translate(200,50)"><g /><g /><g /><g /></g></g></svg>